# Internal applications configuration
# ApplicationSet CRD is not installed in this cluster — all disabled
argocd:
  app1:
    enabled: false
  app2:
    enabled: false
  externalApps:
    externalApp:
      enabled: false
      targetRevision: HEAD
    phpWebApp:
      enabled: false
      targetRevision: HEAD

# Target repository for internal applications
targetRepo: https://github.com/triplom/infrastructure-repo-argocd.git
targetRevision: HEAD

# External repositories configuration
externalApps:
  externalApp:
    enabled: false
    targetRevision: HEAD
  externalApp2:
    enabled: false
    targetRevision: HEAD
  phpWebApp:
    enabled: false
    targetRevision: HEAD

# Shiny Stock App
shinyStockApp:
  enabled: true
  repoURL: https://github.com/triplom/shiny-python-stock-app.git
  targetRevision: HEAD

# Headlamp Kubernetes UI
headlamp:
  enabled: true
  chartVersion: "0.41.0"

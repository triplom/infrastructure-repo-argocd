# Internal applications configuration (from src/ directory)
argocd:
  app1:
    enabled: true
  app2:
    enabled: true
  externalApps:
    externalApp:
      enabled: true
      targetRevision: HEAD
    phpWebApp:
      enabled: true
      targetRevision: HEAD

# Target repository for internal applications
targetRepo: https://github.com/triplom/infrastructure-repo-argocd.git
targetRevision: HEAD

# External repositories configuration
externalApps:
  externalApp:
    enabled: true
    targetRevision: HEAD
  externalApp2:
    enabled: true
    targetRevision: HEAD
  phpWebApp:
    enabled: true
    targetRevision: HEAD

name: Promote Apps (GitOps via ArgoCD)

# Chapter 5 (Pull-based/GitOps): Promote apps between environments by updating
# Kustomize overlays in Git. ArgoCD detects the commit and syncs to target cluster.
# Key difference from push-based: no kubectl, no CI-to-cluster connection for promotion.
on:
  workflow_dispatch:
    inputs:
      source_environment:
        description: 'Promote FROM'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa]
      target_environment:
        description: 'Promote TO'
        required: true
        default: 'qa'
        type: choice
        options: [qa, prod]
      application:
        description: 'Application to promote'
        required: true
        default: 'all'
        type: choice
        options: [all, app1, app2]
      image_tag:
        description: 'Image tag to promote (leave blank to copy from source env)'
        required: false
        default: ''

  # Auto-trigger after successful CI deploy to dev
  workflow_run:
    workflows: ['CI — Build & Deploy Apps (GitOps via ArgoCD)']
    types: [completed]
    branches: [main]

permissions:
  contents: write

env:
  IMAGE_PREFIX: triplom
  SRC_ENV: ${{ github.event.inputs.source_environment || 'dev' }}
  TGT_ENV: ${{ github.event.inputs.target_environment || 'qa' }}

jobs:
  promote:
    name: Promote ${{ github.event.inputs.application || 'all' }} — ${{ github.event.inputs.source_environment || 'dev' }} → ${{ github.event.inputs.target_environment || 'qa' }}
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    environment: ${{ github.event.inputs.target_environment || 'qa' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Resolve image tag from source environment
        id: resolve_tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"

          if [ -z "$TAG" ]; then
            # Read the current tag from the source environment's kustomization
            APP_INPUT="${{ github.event.inputs.application || 'all' }}"
            REF_APP="app1"
            [ "$APP_INPUT" != "all" ] && REF_APP="$APP_INPUT"

            SRC_KFILE="apps/${REF_APP}/overlays/${{ env.SRC_ENV }}/kustomization.yaml"
            if [ -f "$SRC_KFILE" ]; then
              TAG=$(grep 'newTag' "$SRC_KFILE" | sed 's/.*newTag: *//' | tr -d '"' | head -1)
              echo "Resolved tag from source env: $TAG"
            fi
          fi

          # Fallback: use latest git SHA
          [ -z "$TAG" ] && TAG="sha-$(git rev-parse --short HEAD)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Promoting tag: $TAG from ${{ env.SRC_ENV }} → ${{ env.TGT_ENV }}"

      - name: Update target environment manifests (GitOps)
        env:
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          APP_INPUT="${{ github.event.inputs.application || 'all' }}"
          APPS=()
          if [ "$APP_INPUT" = "all" ]; then
            APPS=(app1 app2)
          else
            APPS=("$APP_INPUT")
          fi

          CHANGED=false
          for APP in "${APPS[@]}"; do
            KFILE="apps/${APP}/overlays/${{ env.TGT_ENV }}/kustomization.yaml"
            if [ -f "$KFILE" ]; then
              sed -i "s/newTag: .*/newTag: \"${TAG}\"/" "$KFILE"
              echo "Promoted ${APP} → ${TAG} in ${{ env.TGT_ENV }}"
              CHANGED=true
            else
              echo "kustomization not found: $KFILE — skipping ${APP}"
            fi
          done

          echo "changed=$CHANGED" >> $GITHUB_ENV

      - name: Commit promotion to Git (triggers ArgoCD sync on target env)
        env:
          TAG: ${{ steps.resolve_tag.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/
          git diff --staged --quiet && echo "No changes to promote" && exit 0
          git commit -m "promote: ${{ github.event.inputs.application || 'all' }} to ${{ env.TGT_ENV }} @ ${TAG} [skip ci]"
          git push
          echo "Promotion committed to Git"
          echo "ArgoCD on ${{ env.TGT_ENV }} cluster will detect and apply automatically (pull-based)"

  # ── Optional: force ArgoCD sync on target cluster ─────────────────────────
  argocd-sync:
    name: Force ArgoCD Sync on ${{ github.event.inputs.target_environment || 'qa' }}
    runs-on: ubuntu-latest
    needs: promote

    steps:
      - name: Setup ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Sync target environment via ArgoCD (if cluster accessible)
        env:
          TAG: ${{ needs.promote.outputs.tag || 'latest' }}
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG }}"
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "=== GitOps Promotion Summary ==="
            echo "Manifests updated in Git for ${{ env.TGT_ENV }}."
            echo "ArgoCD is polling Git and will sync ${{ env.TGT_ENV }} cluster automatically."
            echo "Pull-based GitOps advantage: no cluster credentials needed in CI for promotion."
            exit 0
          fi

          mkdir -p ~/.kube
          echo "$KUBECONFIG_SECRET" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl config use-context kind-${{ env.TGT_ENV }}-cluster

          ARGOCD_PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d 2>/dev/null || echo "")
          if [ -z "$ARGOCD_PASS" ]; then
            echo "ArgoCD not accessible — it will auto-sync from Git"
            exit 0
          fi

          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 5
          argocd login localhost:8080 --username admin --password "$ARGOCD_PASS" --insecure

          APP_INPUT="${{ github.event.inputs.application || 'all' }}"
          if [ "$APP_INPUT" = "all" ]; then
            APPS=(app1 app2)
          else
            APPS=("$APP_INPUT")
          fi

          for APP in "${APPS[@]}"; do
            APP_NAME="${APP}-${{ env.TGT_ENV }}"
            echo "Syncing ArgoCD application: $APP_NAME"
            argocd app sync "$APP_NAME" --timeout 300 || \
              echo "ArgoCD sync for $APP_NAME will complete automatically"
            argocd app wait "$APP_NAME" --timeout 300 --health || true
          done

          kill %1 || true
          echo "=== ArgoCD promotion complete ==="
          echo "Applications promoted to ${{ env.TGT_ENV }} via pull-based GitOps"

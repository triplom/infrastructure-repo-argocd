name: Deploy Monitoring (GitOps — ArgoCD managed)

# Chapter 5 (Pull-based/GitOps): Monitoring stack (Prometheus, Grafana, Alertmanager)
# is managed by ArgoCD via the app-of-apps-monitoring pattern.
# This workflow updates monitoring manifests in Git; ArgoCD reconciles automatically.
on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/monitoring/**'
      - 'app-of-apps-monitoring/**'
      - '.github/workflows/deploy-monitoring.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      component:
        description: 'Monitoring component'
        required: true
        default: 'all'
        type: choice
        options: [all, prometheus, grafana, alertmanager]
      force_sync:
        description: 'Force ArgoCD sync now'
        required: false
        default: 'false'
        type: boolean

env:
  ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ── Validate monitoring manifests ─────────────────────────────────────────
  validate:
    name: Validate Monitoring Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Validate app-of-apps-monitoring chart
        run: |
          if [ -f "app-of-apps-monitoring/Chart.yaml" ]; then
            helm lint app-of-apps-monitoring/ && echo "app-of-apps-monitoring chart: OK"
          fi

      - name: Validate monitoring overlays
        run: |
          for ENV_NAME in dev qa prod; do
            OVERLAY="infrastructure/monitoring/overlays/${ENV_NAME}"
            if [ -d "$OVERLAY" ]; then
              kustomize build "$OVERLAY" > /dev/null && echo "monitoring/${ENV_NAME}: OK"
            fi
          done

  # ── GitOps update: commit manifest changes, ArgoCD reconciles ─────────────
  gitops-update:
    name: GitOps Update — Monitoring (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Add Prometheus Helm repo (for chart metadata)
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Check for manifest changes
        id: changes
        run: |
          if git diff --name-only HEAD~1..HEAD 2>/dev/null | grep -qE 'infrastructure/monitoring|app-of-apps-monitoring'; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Annotate monitoring manifests with chart version
        run: |
          # Update Helm chart version annotation so ArgoCD detects a real change
          CHART_VERSION=$(helm search repo prometheus-community/kube-prometheus-stack \
            --output json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['version'])" 2>/dev/null || echo "latest")
          echo "Prometheus chart version: ${CHART_VERSION}"

          # If app-of-apps-monitoring has a Chart.yaml, update appVersion
          if [ -f "app-of-apps-monitoring/Chart.yaml" ]; then
            sed -i "s/^appVersion:.*/appVersion: \"${CHART_VERSION}\"/" app-of-apps-monitoring/Chart.yaml || true
          fi

      - name: Commit monitoring config changes (GitOps pattern)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/monitoring/ app-of-apps-monitoring/ 2>/dev/null || true
          git diff --staged --quiet && echo "No monitoring changes to commit" && exit 0
          git commit -m "chore: update monitoring stack manifests [skip ci]"
          git push
          echo "Monitoring manifests committed — ArgoCD will reconcile automatically"

  # ── Optional: force ArgoCD sync via CLI ───────────────────────────────────
  argocd-sync:
    name: Force ArgoCD Sync (optional)
    runs-on: ubuntu-latest
    needs: gitops-update
    if: github.event.inputs.force_sync == 'true'

    steps:
      - name: Setup ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Configure kubeconfig
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG }}"
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "KUBECONFIG not set — ArgoCD will auto-sync within its polling interval"
            exit 0
          fi
          mkdir -p ~/.kube
          if printf '%s' "$KUBECONFIG_SECRET" | grep -q '^apiVersion:'; then
            printf '%s' "$KUBECONFIG_SECRET" > ~/.kube/config
          else
            printf '%s' "$KUBECONFIG_SECRET" | base64 -d > ~/.kube/config
          fi
          chmod 600 ~/.kube/config
          CONTEXT_NAME="kind-${{ env.ENV }}-cluster"
          if kubectl config get-contexts "$CONTEXT_NAME" > /dev/null 2>&1; then
            kubectl config use-context "$CONTEXT_NAME"
          else
            echo "::warning::Context $CONTEXT_NAME not found, using current kubeconfig context"
          fi

      - name: Force sync monitoring app-of-apps
        run: |
          ARGOCD_PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d)
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 5
          argocd login localhost:8080 --username admin --password "$ARGOCD_PASS" --insecure

          echo "Syncing app-of-apps-monitoring..."
          argocd app sync app-of-apps-monitoring --timeout 300 || true
          argocd app wait app-of-apps-monitoring --timeout 300 --health || true

          COMPONENT="${{ github.event.inputs.component || 'all' }}"
          if [ "$COMPONENT" != "all" ]; then
            argocd app sync "${COMPONENT}-${{ env.ENV }}" --timeout 180 || true
          fi

          kill %1 || true
          echo "Force sync complete — ArgoCD applied monitoring changes"

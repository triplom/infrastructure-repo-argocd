name: Deploy Monitoring Stack

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/monitoring/**'
      - 'app-of-apps-monitoring/**'
      - '.github/workflows/deploy-monitoring.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      component:
        description: 'Component to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - prometheus
          - grafana
          - alertmanager

jobs:
  deploy:
    name: Deploy Monitoring
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      ENV: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Setup ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          argocd version --client
      
      - name: Setup Kubeconfig
        run: |
          # Create temporary kubeconfig file based on environment
          TEMP_KUBECONFIG=$(mktemp)
          echo "${{ secrets[format('KUBECONFIG_{0}', env.ENV)] }}" | base64 -d > "${TEMP_KUBECONFIG}"
          chmod 600 "${TEMP_KUBECONFIG}"
          
          # Set KUBECONFIG environment variable
          echo "KUBECONFIG=${TEMP_KUBECONFIG}" >> $GITHUB_ENV
          
          # Verify kubeconfig and set context
          if ! kubectl config get-contexts; then
            echo "::error::Failed to get kubectl contexts. Check KUBECONFIG_${ENV} secret."
            exit 1
          fi
          
          # Set the correct context for the environment
          CONTEXT_NAME="kind-${ENV}-cluster"
          if ! kubectl config use-context "$CONTEXT_NAME"; then
            echo "::error::Failed to set context to $CONTEXT_NAME"
            exit 1
          fi
          
          echo "Using Kubernetes context: $(kubectl config current-context)"
      
      - name: Sync Monitoring Components via ArgoCD
        run: |
          COMPONENT="${{ github.event.inputs.component || 'all' }}"
          
          # Get ArgoCD admin password
          echo "Getting ArgoCD admin password..."
          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          
          # Port forward to ArgoCD server in background
          echo "Setting up port forwarding to ArgoCD..."
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          PORT_FORWARD_PID=$!
          sleep 10
          
          # Login to ArgoCD
          echo "Logging into ArgoCD..."
          argocd login localhost:8080 --username admin --password "${ARGOCD_PASSWORD}" --insecure
          
          # Function to sync monitoring component
          sync_monitoring() {
            local component=$1
            local app_name="${component}-${ENV}"
            
            echo "============================================="
            echo "Syncing monitoring component: $app_name"
            echo "============================================="
            
            # Check if ArgoCD application exists
            if ! argocd app get "$app_name" > /dev/null 2>&1; then
              echo "::error::ArgoCD application $app_name not found"
              return 1
            fi
            
            # Sync the application
            echo "Syncing monitoring application $app_name..."
            if argocd app sync "$app_name" --timeout 600; then
              echo "✅ Successfully synced $app_name"
              
              # Wait for sync to complete and check health
              echo "Waiting for $app_name to become healthy..."
              argocd app wait "$app_name" --timeout 600 --health || {
                echo "::warning::$app_name did not become healthy within timeout, but sync completed"
              }
            else
              echo "::error::Failed to sync $app_name"
              return 1
            fi
            
            return 0
          }
          
          # Sync based on component selection
          FAILED_COMPONENTS=""
          
          if [ "$COMPONENT" = "all" ]; then
            # Sync all monitoring components
            MONITORING_COMPONENTS="prometheus grafana alertmanager"
            
            for comp in $MONITORING_COMPONENTS; do
              if ! sync_monitoring "$comp"; then
                FAILED_COMPONENTS="$FAILED_COMPONENTS $comp"
                echo "::warning::Failed to sync $comp, continuing with others"
              fi
            done
            
            # Also sync the app-of-apps-monitoring parent
            if ! argocd app sync "app-of-apps-monitoring" --timeout 300; then
              FAILED_COMPONENTS="$FAILED_COMPONENTS app-of-apps-monitoring"
              echo "::warning::Failed to sync app-of-apps-monitoring"
            fi
            
          else
            # Sync specific component
            if ! sync_monitoring "$COMPONENT"; then
              echo "::error::Sync of $COMPONENT failed"
              kill $PORT_FORWARD_PID || true
              exit 1
            fi
          fi
          
          # Report any failures
          if [ -n "$FAILED_COMPONENTS" ]; then
            echo "::error::The following monitoring components failed to sync:$FAILED_COMPONENTS"
            kill $PORT_FORWARD_PID || true
            exit 1
          else
            echo "✅ All monitoring components successfully synced"
          fi
          
          # Cleanup port forward
          kill $PORT_FORWARD_PID || true
      
      - name: Verify ArgoCD Applications
        if: success()
        run: |
          echo "Verifying ArgoCD monitoring applications..."
          
          # Check ArgoCD applications status
          kubectl get applications -n argocd -o custom-columns=NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status | grep -E "(prometheus|grafana|alertmanager|monitoring)" || echo "No monitoring applications found"
          
          # Check actual monitoring resources in their namespaces
          echo ""
          echo "Checking monitoring resources across namespaces..."
          
          # Check for prometheus resources
          if kubectl get pods -A -l "app=prometheus" 2>/dev/null | grep -q prometheus; then
            echo "✅ Prometheus pods found"
            kubectl get pods -A -l "app=prometheus"
          else
            echo "⚠️ No Prometheus pods found"
          fi
          
          # Check for grafana resources  
          if kubectl get pods -A -l "app.kubernetes.io/name=grafana" 2>/dev/null | grep -q grafana; then
            echo "✅ Grafana pods found"
            kubectl get pods -A -l "app.kubernetes.io/name=grafana"
          else
            echo "⚠️ No Grafana pods found"
          fi
          
          # Check for alertmanager resources
          if kubectl get pods -A -l "app=alertmanager" 2>/dev/null | grep -i alert; then
            echo "✅ AlertManager pods found"
            kubectl get pods -A -l "app=alertmanager"
          else
            echo "⚠️ No AlertManager pods found"
          fi
      
      - name: Get access information
        if: success()
        run: |
          echo "===========================================" 
          echo "Monitoring Stack Access Information"
          echo "==========================================="
          echo ""
          echo "ArgoCD Applications Status:"
          kubectl get applications -n argocd -o custom-columns=NAME:.metadata.name,SYNC:.status.sync.status,HEALTH:.status.health.status | grep -E "(NAME|prometheus|grafana|alertmanager|monitoring)" || echo "No monitoring applications found"
          echo ""
          echo "Access monitoring services via port-forwarding:"
          echo ""
          echo "For Prometheus (check namespace first):"
          echo "kubectl port-forward -n prometheus-${ENV} svc/prometheus-operated 9090:9090"
          echo "OR if in monitoring namespace:"
          echo "kubectl port-forward -n monitoring svc/prometheus-operated 9090:9090"
          echo ""
          echo "For Grafana:"
          echo "kubectl port-forward -n grafana-${ENV} svc/grafana 3000:80"
          echo "OR if in monitoring namespace:"
          echo "kubectl port-forward -n monitoring svc/grafana 3000:80"
          echo ""
          echo "Check actual service locations:"
          kubectl get svc -A | grep -E "(prometheus|grafana|alertmanager)" || echo "No monitoring services found"
      
      - name: Cleanup
        if: always()
        run: |
          # Kubeconfig cleanup is automatic with temp files
          echo "Cleanup completed"
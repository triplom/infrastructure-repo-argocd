name: CI — Build & Deploy Apps (GitOps via ArgoCD)

# Chapter 5 (Pull-based/GitOps): CI builds images → pushes to Docker Hub →
# updates Kustomize manifests in Git → ArgoCD auto-syncs to cluster.
# Key difference from push-based: CI never touches the cluster directly.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'apps/**'
      - '.github/workflows/deploy-apps.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      application:
        description: 'Application to build and deploy'
        required: true
        default: 'all'
        type: choice
        options: [all, app1, app2]

permissions:
  contents: write   # needed to commit manifest updates back to Git

env:
  IMAGE_PREFIX: triplom
  ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ── Job 1: Build & push images to Docker Hub ──────────────────────────────
  build:
    name: Build & Push — ${{ matrix.app }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        app: [app1, app2]

    outputs:
      sha_tag: ${{ steps.sha_tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if component not requested
        if: github.event.inputs.application != '' && github.event.inputs.application != 'all' && github.event.inputs.application != matrix.app
        run: |
          echo "Skipping ${{ matrix.app }} — not requested"
          exit 0

      - name: Compute short SHA tag
        id: sha_tag
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.app }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ steps.sha_tag.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          echo "Built: ${{ env.IMAGE_PREFIX }}/${{ matrix.app }}:${{ steps.sha_tag.outputs.tag }}"

  # ── Job 2: Update Kustomize manifests in Git (GitOps pattern) ─────────────
  # ArgoCD detects this commit and syncs — CI never kubectl-applies to cluster.
  gitops-update:
    name: Update Manifests (GitOps) — ${{ github.event.inputs.environment || 'dev' }}
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}

      - name: Update image tags in Kustomize overlays
        env:
          SHA_TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          APP_INPUT="${{ github.event.inputs.application || 'all' }}"
          ENV_NAME="${{ env.ENV }}"

          APPS=()
          if [ "$APP_INPUT" = "all" ]; then
            APPS=(app1 app2)
          else
            APPS=("$APP_INPUT")
          fi

          for APP in "${APPS[@]}"; do
            KFILE="apps/${APP}/overlays/${ENV_NAME}/kustomization.yaml"
            if [ -f "$KFILE" ]; then
              # Update the newTag field for this app's image
              sed -i "s/newTag: .*/newTag: \"${SHA_TAG}\"/" "$KFILE"
              echo "Updated ${APP} → ${SHA_TAG} in ${ENV_NAME}"
            else
              echo "kustomization not found: $KFILE — skipping"
            fi
          done

      - name: Commit manifest update (triggers ArgoCD sync)
        env:
          SHA_TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/
          git diff --staged --quiet && echo "No manifest changes to commit" && exit 0
          git commit -m "chore: update app images to ${SHA_TAG} in ${{ env.ENV }} [skip ci]"
          git push
          echo "Manifest committed — ArgoCD will detect and sync automatically (pull-based GitOps)"

  # ── Job 3: Report ArgoCD sync status (informational) ──────────────────────
  argocd-status:
    name: ArgoCD Sync Status
    runs-on: [self-hosted, linux, x64, triplom-linux]
    needs: gitops-update
    if: github.event_name != 'pull_request'

    steps:
      - name: Setup ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Check ArgoCD sync (if cluster accessible)
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG }}"
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "=== GitOps Deployment Summary ==="
            echo "Image manifests updated in Git."
            echo "ArgoCD is polling Git every ~3 minutes and will sync automatically."
            echo "No direct cluster access required from CI — this is pull-based GitOps."
            echo ""
            echo "To check status locally:"
            echo "  argocd app list"
            echo "  argocd app get app1-${{ env.ENV }}"
            exit 0
          fi

          mkdir -p ~/.kube
          if printf '%s' "$KUBECONFIG_SECRET" | grep -q '^apiVersion:'; then
            printf '%s' "$KUBECONFIG_SECRET" > ~/.kube/config
          else
            printf '%s' "$KUBECONFIG_SECRET" | base64 -d > ~/.kube/config
          fi
          chmod 600 ~/.kube/config
          CONTEXT_NAME="kind-${{ env.ENV }}-cluster"
          if kubectl config get-contexts "$CONTEXT_NAME" > /dev/null 2>&1; then
            kubectl config use-context "$CONTEXT_NAME"
          else
            echo "::warning::Context $CONTEXT_NAME not found, using current kubeconfig context"
          fi
          SERVER_URL=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
          echo "Kubernetes API server: ${SERVER_URL}"
          if printf '%s' "$SERVER_URL" | grep -Eq 'https://(127\.0\.0\.1|localhost|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)'; then
            echo "Kubernetes API endpoint is local/private and not reachable from GitHub-hosted runners"
            echo "Skipping direct ArgoCD check. ArgoCD will continue pull-based reconciliation locally."
            exit 0
          fi

          ARGOCD_PASS=$(kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath="{.data.password}" | base64 -d 2>/dev/null || echo "")
          if [ -z "$ARGOCD_PASS" ]; then
            echo "ArgoCD not yet installed or secret not found"
            exit 0
          fi

          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          sleep 5
          argocd login localhost:8080 --username admin --password "$ARGOCD_PASS" --insecure

          echo "=== ArgoCD application status ==="
          argocd app list || true

          kill %1 || true

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - '.github/workflows/ci-pipeline.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      component:
        description: 'Component to build and deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - app1
          - app2

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_PREFIX: ${{ github.repository_owner }}

jobs:
  build:
    name: Build and Push Container Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.component != ''
    
    strategy:
      matrix:
        app: [app1, app2]
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Check if app source changed
        id: changes
        if: github.event_name == 'push'
        run: |
          # Check if this specific app's source code changed
          if git diff --name-only ${{ github.event.before }}...${{ github.sha }} | grep -q "^src/${{ matrix.app }}/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "${{ matrix.app }} source code changed"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "${{ matrix.app }} source code unchanged"
          fi
      
      - name: Skip unchanged apps
        if: github.event_name == 'push' && steps.changes.outputs.changed == 'false'
        run: |
          echo "Skipping ${{ matrix.app }} - no source code changes"
          exit 0
      
      - name: Skip if specific component requested
        if: github.event.inputs.component != 'all' && github.event.inputs.component != matrix.app
        run: |
          echo "Skipping ${{ matrix.app }} - not the requested component"
          exit 0
      
      - name: Set up Docker Build
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ./src/${{ matrix.app }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Output image details
        if: steps.changes.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          echo "Built and pushed image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${{ matrix.app }}:latest"
          echo "Full tags: ${{ steps.meta.outputs.tags }}"

  update-manifests:
    name: Update Kubernetes Manifests
    runs-on: ubuntu-latest
    needs: build
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    
    strategy:
      matrix:
        environment: [dev, qa, prod]
        app: [app1, app2]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CONFIG_REPO_PAT || github.token }}
      
      - name: Check if update needed
        id: check-update
        run: |
          # For workflow_dispatch, check if this env/app combination is requested
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV_INPUT="${{ github.event.inputs.environment }}"
            COMPONENT_INPUT="${{ github.event.inputs.component }}"
            
            # Skip if specific environment requested and this isn't it
            if [ "$ENV_INPUT" != "${{ matrix.environment }}" ]; then
              echo "update=false" >> $GITHUB_OUTPUT
              echo "Skipping ${{ matrix.environment }} - not requested environment"
              exit 0
            fi
            
            # Skip if specific component requested and this isn't it
            if [ "$COMPONENT_INPUT" != "all" ] && [ "$COMPONENT_INPUT" != "${{ matrix.app }}" ]; then
              echo "update=false" >> $GITHUB_OUTPUT
              echo "Skipping ${{ matrix.app }} - not requested component"
              exit 0
            fi
          fi
          
          # For push events, check if this app's source changed
          if [ "${{ github.event_name }}" = "push" ]; then
            if git diff --name-only ${{ github.event.before }}...${{ github.sha }} | grep -q "^src/${{ matrix.app }}/"; then
              echo "update=true" >> $GITHUB_OUTPUT
              echo "${{ matrix.app }} needs update for ${{ matrix.environment }}"
            else
              echo "update=false" >> $GITHUB_OUTPUT
              echo "${{ matrix.app }} no update needed for ${{ matrix.environment }}"
              exit 0
            fi
          else
            echo "update=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Setup yq
        if: steps.check-update.outputs.update == 'true'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version
      
      - name: Update image reference
        if: steps.check-update.outputs.update == 'true'
        run: |
          APP_NAME="${{ matrix.app }}"
          ENV_NAME="${{ matrix.environment }}"
          NEW_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${APP_NAME}:latest"
          
          # Path to the kustomization file
          KUSTOMIZATION_FILE="apps/${APP_NAME}/overlays/${ENV_NAME}/kustomization.yaml"
          
          if [ ! -f "$KUSTOMIZATION_FILE" ]; then
            echo "::error::Kustomization file not found: $KUSTOMIZATION_FILE"
            exit 1
          fi
          
          echo "Updating image reference in $KUSTOMIZATION_FILE"
          echo "New image: $NEW_IMAGE"
          
          # Update the image reference using yq
          yq eval ".images[0].newName = \"${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${APP_NAME}\"" -i "$KUSTOMIZATION_FILE"
          yq eval ".images[0].newTag = \"latest\"" -i "$KUSTOMIZATION_FILE"
          
          # Show the changes
          echo "Updated kustomization.yaml:"
          cat "$KUSTOMIZATION_FILE"
      
      - name: Commit and push changes
        if: steps.check-update.outputs.update == 'true'
        run: |
          APP_NAME="${{ matrix.app }}"
          ENV_NAME="${{ matrix.environment }}"
          
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Configure git remote with token authentication
          git remote set-url origin https://x-access-token:${{ secrets.CONFIG_REPO_PAT || github.token }}@github.com/${{ github.repository }}.git
          
          # Check if there are changes to commit
          if git diff --quiet; then
            echo "No changes to commit for ${APP_NAME} in ${ENV_NAME}"
            exit 0
          fi
          
          # Add and commit changes
          git add "apps/${APP_NAME}/overlays/${ENV_NAME}/kustomization.yaml"
          git commit -m "Update ${APP_NAME} image for ${ENV_NAME} environment
          
          - Updated image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_PREFIX }}/${APP_NAME}:latest
          - Commit: ${{ github.sha }}
          - Triggered by: ${{ github.event_name }}"
          
          # Push changes
          git push origin main
          
          echo "✅ Updated ${APP_NAME} manifest for ${ENV_NAME} environment"

  argocd-sync:
    name: Trigger ArgoCD Sync
    runs-on: ubuntu-latest
    needs: [build, update-manifests]
    if: always() && needs.update-manifests.result == 'success'
    
    strategy:
      matrix:
        environment: [dev, qa, prod]
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Setup ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          argocd version --client
      
      - name: Setup Kubeconfig
        run: |
          ENV_NAME="${{ matrix.environment }}"
          
          # Create temporary kubeconfig file based on environment
          TEMP_KUBECONFIG=$(mktemp)
          echo "${{ secrets[format('KUBECONFIG_{0}', matrix.environment)] }}" | base64 -d > "${TEMP_KUBECONFIG}"
          chmod 600 "${TEMP_KUBECONFIG}"
          
          # Set KUBECONFIG environment variable
          echo "KUBECONFIG=${TEMP_KUBECONFIG}" >> $GITHUB_ENV
          
          # Verify kubeconfig and set context
          if ! kubectl config get-contexts; then
            echo "::error::Failed to get kubectl contexts. Check KUBECONFIG_${ENV_NAME} secret."
            exit 1
          fi
          
          # Set the correct context for the environment
          CONTEXT_NAME="kind-${ENV_NAME}-cluster"
          if ! kubectl config use-context "$CONTEXT_NAME"; then
            echo "::error::Failed to set context to $CONTEXT_NAME"
            exit 1
          fi
          
          echo "Using Kubernetes context: $(kubectl config current-context)"
      
      - name: Sync ArgoCD Applications
        run: |
          ENV_NAME="${{ matrix.environment }}"
          
          # Get ArgoCD admin password
          echo "Getting ArgoCD admin password..."
          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          
          # Port forward to ArgoCD server in background
          echo "Setting up port forwarding to ArgoCD..."
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          PORT_FORWARD_PID=$!
          sleep 10
          
          # Login to ArgoCD
          echo "Logging into ArgoCD..."
          argocd login localhost:8080 --username admin --password "${ARGOCD_PASSWORD}" --insecure
          
          # Determine which apps to sync based on trigger
          APPS_TO_SYNC=""
          
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COMPONENT="${{ github.event.inputs.component }}"
            if [ "$COMPONENT" = "all" ]; then
              APPS_TO_SYNC="app1-${ENV_NAME} app2-${ENV_NAME}"
            else
              APPS_TO_SYNC="${COMPONENT}-${ENV_NAME}"
            fi
          else
            # For push events, sync all apps (since we don't know which matrix jobs succeeded)
            APPS_TO_SYNC="app1-${ENV_NAME} app2-${ENV_NAME}"
          fi
          
          # Sync each application
          for app in $APPS_TO_SYNC; do
            echo "Syncing application: $app"
            
            if argocd app get "$app" > /dev/null 2>&1; then
              if argocd app sync "$app" --timeout 300; then
                echo "✅ Successfully synced $app"
                
                # Wait for sync to complete
                argocd app wait "$app" --timeout 300 --health || {
                  echo "::warning::$app did not become healthy within timeout"
                }
              else
                echo "::error::Failed to sync $app"
              fi
            else
              echo "::warning::Application $app not found in ArgoCD"
            fi
          done
          
          # Cleanup port forward
          kill $PORT_FORWARD_PID || true
          
          echo "✅ ArgoCD sync completed for $ENV_NAME environment"
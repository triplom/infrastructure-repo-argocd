name: Deploy Infrastructure (Pull-Based GitOps - ArgoCD Only)

# This workflow is disabled for pull-based GitOps demonstration
# ArgoCD handles all infrastructure deployments automatically
on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'infrastructure/argocd/**'
  #     - 'infrastructure/github-registry/**'
  #     - 'infrastructure/cert-manager/**'
  #     - 'infrastructure/ingress-nginx/**'
  #     - 'app-of-apps-infra/**'
  #     - '.github/workflows/deploy-infrastructure.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - prod
      component:
        description: 'Component to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - cert-manager
          - ingress-nginx
          - github-registry

jobs:
  deploy:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      ENV: ${{ github.event.inputs.environment || 'dev' }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
      
      - name: Setup ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          argocd version --client
      
      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.13.3'
      
      - name: Setup Kubeconfig
        run: |
          # Check if kubeconfig secret exists
          KUBECONFIG_SECRET="${{ secrets[format('KUBECONFIG_{0}', env.ENV)] }}"
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "::warning::KUBECONFIG_${ENV} secret not found. This workflow requires local KIND clusters."
            echo "::warning::For pull-based GitOps demo, ArgoCD should be running locally on KIND clusters."
            echo "Skipping deployment as this is a pull-based GitOps demonstration."
            exit 0
          fi
          
          # Create temporary kubeconfig file based on environment
          TEMP_KUBECONFIG=$(mktemp)
          echo "$KUBECONFIG_SECRET" | base64 -d > "${TEMP_KUBECONFIG}"
          chmod 600 "${TEMP_KUBECONFIG}"
          
          # Set KUBECONFIG environment variable
          echo "KUBECONFIG=${TEMP_KUBECONFIG}" >> $GITHUB_ENV
          
          # Verify kubeconfig and set context
          if ! kubectl config get-contexts; then
            echo "::error::Failed to get kubectl contexts. Check KUBECONFIG_${ENV} secret."
            exit 1
          fi
          
          # Set the correct context for the environment
          CONTEXT_NAME="kind-${ENV}-cluster"
          if ! kubectl config use-context "$CONTEXT_NAME"; then
            echo "::error::Failed to set context to $CONTEXT_NAME"
            exit 1
          fi
          
          echo "Using Kubernetes context: $(kubectl config current-context)"
      
      - name: Sync Infrastructure Components via ArgoCD
        run: |
          COMPONENT="${{ github.event.inputs.component || 'all' }}"
          
          # Get ArgoCD admin password
          echo "Getting ArgoCD admin password..."
          ARGOCD_PASSWORD=$(kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath="{.data.password}" | base64 -d)
          
          # Port forward to ArgoCD server in background
          echo "Setting up port forwarding to ArgoCD..."
          kubectl port-forward svc/argocd-server -n argocd 8080:443 &
          PORT_FORWARD_PID=$!
          sleep 10
          
          # Login to ArgoCD
          echo "Logging into ArgoCD..."
          argocd login localhost:8080 --username admin --password "${ARGOCD_PASSWORD}" --insecure
          
          # Function to sync infrastructure component
          sync_infrastructure() {
            local component=$1
            
            echo "============================================="
            echo "Syncing infrastructure component: $component"
            echo "============================================="
            
            # Check if ArgoCD application exists
            if ! argocd app get "$component" > /dev/null 2>&1; then
              echo "::error::ArgoCD application $component not found"
              return 1
            fi
            
            # Sync the application
            echo "Syncing infrastructure application $component..."
            if argocd app sync "$component" --timeout 300; then
              echo "✅ Successfully synced $component"
              
              # Wait for sync to complete and check health
              echo "Waiting for $component to become healthy..."
              argocd app wait "$component" --timeout 300 --health || {
                echo "::warning::$component did not become healthy within timeout, but sync completed"
              }
            else
              echo "::error::Failed to sync $component"
              return 1
            fi
            
            return 0
          }
          
          # Sync based on component selection
          FAILED_COMPONENTS=""
          
          if [ "$COMPONENT" = "all" ]; then
            # Sync all infrastructure components
            INFRA_COMPONENTS="cert-manager ingress-nginx github-registry"
            
            for comp in $INFRA_COMPONENTS; do
              if ! sync_infrastructure "$comp"; then
                FAILED_COMPONENTS="$FAILED_COMPONENTS $comp"
                echo "::warning::Failed to sync $comp, continuing with others"
              fi
            done
            
            # Also sync the app-of-apps-infra parent
            if ! sync_infrastructure "app-of-apps-infra"; then
              FAILED_COMPONENTS="$FAILED_COMPONENTS app-of-apps-infra"
              echo "::warning::Failed to sync app-of-apps-infra"
            fi
            
          else
            # Sync specific component
            if ! sync_infrastructure "$COMPONENT"; then
              echo "::error::Sync of $COMPONENT failed"
              kill $PORT_FORWARD_PID || true
              exit 1
            fi
          fi
          
          # Report any failures
          if [ -n "$FAILED_COMPONENTS" ]; then
            echo "::error::The following infrastructure components failed to sync:$FAILED_COMPONENTS"
            kill $PORT_FORWARD_PID || true
            exit 1
          else
            echo "✅ All infrastructure components successfully synced"
          fi
          
          # Cleanup port forward
          kill $PORT_FORWARD_PID || true
      
      - name: Cleanup
        if: always()
        run: |
          # Remove kubeconfig when done
          rm -f ./kubeconfig
name: Deploy Infrastructure + ArgoCD Bootstrap

# Chapter 5 (Pull-based/GitOps): Install KIND clusters, cert-manager, ingress-nginx
# AND install/configure ArgoCD with app-of-apps pattern.
# Key difference from push-based: ArgoCD owns cluster state after bootstrap.
on:
  push:
    branches: [main]
    paths:
      - 'kind/**'
      - 'infrastructure/argocd/**'
      - 'infrastructure/cert-manager/**'
      - 'infrastructure/ingress-nginx/**'
      - 'root-app/**'
      - 'app-of-apps-infra/**'
      - '.github/workflows/deploy-infrastructure.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, qa, prod]
      action:
        description: 'Action'
        required: true
        default: 'bootstrap'
        type: choice
        options: [bootstrap, sync-infra, validate]

env:
  ENV: ${{ github.event.inputs.environment || 'dev' }}

jobs:
  # ── Validate all manifests (ArgoCD + infrastructure) ──────────────────────
  validate:
    name: Validate Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Setup Helm (for chart rendering)
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Validate ArgoCD kustomize manifests
        run: |
          if [ -d "infrastructure/argocd/base" ]; then
            kustomize build infrastructure/argocd/base > /dev/null && echo "argocd base: OK"
          fi

      - name: Validate cert-manager manifests
        run: |
          if [ -d "infrastructure/cert-manager/base" ]; then
            kustomize build infrastructure/cert-manager/base > /dev/null && echo "cert-manager: OK"
          fi

      - name: Validate ingress-nginx manifests
        run: |
          echo "ingress-nginx is managed by the app-of-apps-infra Helm chart"
          if [ -f "app-of-apps-infra/Chart.yaml" ]; then
            helm lint app-of-apps-infra/ && echo "ingress-nginx app-of-apps chart path: OK"
          fi

      - name: Validate root-app Helm chart
        run: |
          if [ -f "root-app/Chart.yaml" ]; then
            helm lint root-app/ && echo "root-app chart: OK"
          fi

      - name: Validate app-of-apps-infra chart
        run: |
          if [ -f "app-of-apps-infra/Chart.yaml" ]; then
            helm lint app-of-apps-infra/ && echo "app-of-apps-infra: OK"
          fi

  # ── Bootstrap: install ArgoCD + register app-of-apps ─────────────────────
  bootstrap:
    name: Bootstrap ArgoCD (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: validate
    if: github.event.inputs.action == 'bootstrap' || github.event_name == 'push'
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: '5.3.0'

      - name: Setup ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64
          argocd version --client

      - name: Configure kubeconfig
        run: |
          KUBECONFIG_SECRET="${{ secrets.KUBECONFIG }}"
          if [ -z "$KUBECONFIG_SECRET" ]; then
            echo "KUBECONFIG secret not set — simulation mode"
            echo "GitOps bootstrap requires cluster access once; ArgoCD reconciles thereafter"
            exit 0
          fi
          mkdir -p ~/.kube
          printf '%s' "$KUBECONFIG_SECRET" > ~/.kube/config
          if ! kubectl config get-contexts > /dev/null 2>&1; then
            TEMP_DECODED=$(mktemp)
            if printf '%s' "$KUBECONFIG_SECRET" | base64 -d > "${TEMP_DECODED}" 2>/dev/null && \
               KUBECONFIG="${TEMP_DECODED}" kubectl config get-contexts > /dev/null 2>&1; then
              mv "${TEMP_DECODED}" ~/.kube/config
            else
              rm -f "${TEMP_DECODED}"
              echo "::error::KUBECONFIG secret is neither a valid kubeconfig nor a valid base64-encoded kubeconfig"
              exit 1
            fi
          fi
          chmod 600 ~/.kube/config
          CONTEXT_NAME="kind-${{ env.ENV }}-cluster"
          if kubectl config get-contexts "$CONTEXT_NAME" > /dev/null 2>&1; then
            kubectl config use-context "$CONTEXT_NAME"
          else
            echo "::warning::Context $CONTEXT_NAME not found, using current kubeconfig context"
          fi
          SERVER_URL=$(kubectl config view --minify -o jsonpath='{.clusters[0].cluster.server}')
          echo "Kubernetes API server: ${SERVER_URL}"
          if printf '%s' "$SERVER_URL" | grep -Eq 'https://(127\.0\.0\.1|localhost|10\.|172\.(1[6-9]|2[0-9]|3[0-1])\.|192\.168\.)'; then
            echo "Kubernetes API endpoint is local/private and not reachable from GitHub-hosted runners"
            echo "Skipping bootstrap workflow. Use a self-hosted runner or a routable API endpoint."
            exit 0
          fi
          kubectl cluster-info

      - name: Install cert-manager (prerequisite)
        run: |
          echo "=== GitOps bootstrap: Installing cert-manager ==="
          kubectl create namespace cert-manager --dry-run=client -o yaml | kubectl apply -f -
          kustomize build infrastructure/cert-manager/base | kubectl apply --server-side -f -
          kubectl wait --for=condition=available --timeout=180s \
            deployment/cert-manager -n cert-manager || true

      - name: Install ingress-nginx (prerequisite)
        run: |
          echo "=== GitOps bootstrap: ingress-nginx is managed by ArgoCD app-of-apps-infra ==="
          kubectl create namespace ingress-nginx --dry-run=client -o yaml | kubectl apply -f -
          echo "Skipping imperative ingress-nginx install; ArgoCD will reconcile it from app-of-apps-infra"

      - name: Install ArgoCD
        run: |
          echo "=== GitOps: Installing ArgoCD on ${{ env.ENV }} cluster ==="
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

          if [ -d "infrastructure/argocd/base" ]; then
            kustomize build infrastructure/argocd/base | kubectl apply --server-side -f -
          else
            kubectl apply --server-side -n argocd \
              -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          fi

          echo "Waiting for ArgoCD server..."
          kubectl wait --for=condition=available --timeout=300s \
            deployment/argocd-server -n argocd
          echo "ArgoCD installed"

      - name: Bootstrap app-of-apps (root application)
        run: |
          echo "=== GitOps: Bootstrapping app-of-apps root application ==="
          # This single kubectl apply kicks off the entire GitOps tree.
          # ArgoCD's root app will create app-of-apps-infra, app-of-apps-monitoring, app-of-apps.
          # All subsequent reconciliation is pull-based — no more CI pushes needed.
          kubectl apply -n argocd -f - <<EOF
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: root
            namespace: argocd
            finalizers:
              - resources-finalizer.argocd.argoproj.io
          spec:
            project: default
            source:
              repoURL: https://github.com/triplom/infrastructure-repo-argocd.git
              targetRevision: HEAD
              path: root-app
            destination:
              server: https://kubernetes.default.svc
              namespace: argocd
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
                - ServerSideApply=true
          EOF
          echo "Root app-of-apps registered — ArgoCD will now reconcile all child apps"

      - name: Validate ArgoCD bootstrap
        run: |
          echo "=== GitOps: ArgoCD bootstrap validation ==="
          kubectl get pods -n argocd 2>/dev/null || true
          kubectl get applications -n argocd 2>/dev/null || true
          echo "ArgoCD is now the owner of cluster state (pull-based GitOps)"
          echo "Further changes to Git will be automatically reconciled by ArgoCD"

      - name: Print ArgoCD access info
        run: |
          echo "=== ArgoCD Access ==="
          echo "UI: kubectl port-forward svc/argocd-server -n argocd 8080:443"
          echo "URL: https://localhost:8080"
          echo "User: admin"
          echo "Pass: kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath='{.data.password}' | base64 -d"

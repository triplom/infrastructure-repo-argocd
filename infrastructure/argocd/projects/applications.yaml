# File: infrastructure/argocd/projects/applications.yaml
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: applications
  namespace: argocd
spec:
  description: Project for all applications
  sourceRepos:
  - 'https://github.com/triplom/infrastructure-repo-argocd.git'
  - 'https://github.com/argoproj/argocd-example-apps.git'
  - 'https://github.com/triplom/*'
  - '*'
  destinations:
  - namespace: 'app*'
    server: https://kubernetes.default.svc
  - namespace: 'our-app*'
    server: https://kubernetes.default.svc
  - namespace: 'demo-app*'
    server: https://kubernetes.default.svc
  - namespace: 'php-web-app*'
    server: https://kubernetes.default.svc
  - namespace: 'finance'
    server: https://kubernetes.default.svc
  - namespace: 'headlamp'
    server: https://kubernetes.default.svc
  - namespace: 'monitoring'
    server: https://kubernetes.default.svc
  - namespace: 'automation'
    server: https://kubernetes.default.svc
  clusterResourceWhitelist:
  - group: '*'
    kind: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
---
# Shiny Stock App Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shiny-stock-app
  namespace: finance
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - shiny.local
      secretName: shiny-tls
  rules:
    - host: shiny.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shiny-python-stock-app
                port:
                  number: 80

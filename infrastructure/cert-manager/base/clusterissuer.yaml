# infrastructure/cert-manager/base/clusterissuer.yaml
#
# Self-signed CA setup for homelab (no public domain).
# Stage 1: SelfSigned issuer bootstraps the root CA certificate.
# Stage 2: CA ClusterIssuer signs workload certificates using that root CA.
#
# Usage: annotate Ingress with cert-manager.io/cluster-issuer: homelab-ca
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: homelab-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: homelab-ca
  subject:
    organizations:
      - homelab
  secretName: homelab-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: homelab-ca
spec:
  ca:
    secretName: homelab-ca-secret

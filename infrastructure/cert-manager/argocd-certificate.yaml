apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-tls-cert
  namespace: argocd
spec:
  secretName: argocd-tls-cert
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  commonName: argocd.gitops.local
  dnsNames:
  - argocd.gitops.local
  - argocd.local
  - localhost

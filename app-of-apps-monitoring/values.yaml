# Monitoring components configuration
# ApplicationSet CRD is not installed in this cluster — disabled
argocd:
  monitoring:
    enabled: false

# Target repository for monitoring components
targetRepo: https://github.com/triplom/infrastructure-repo-argocd.git
targetRevision: HEAD

# kube-prometheus-stack manages Prometheus + Grafana + Alertmanager together
kubePrometheusStack:
  enabled: true
  chartVersion: "82.15.0"

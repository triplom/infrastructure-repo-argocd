apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  labels:
    app: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: prometheus
      type: prometheus
      access: proxy
      url: http://prometheus.monitoring.svc.cluster.local:9090
      isDefault: true
      editable: true
      version: 1
      uid: prometheus
      jsonData:
        httpMethod: GET
        timeInterval: "30s"
        manageAlerts: true
        alertmanagerUid: alertmanager
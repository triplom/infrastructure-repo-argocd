version: '3.8'

# N8N + WAHA + Redis + Postgres automation stack
# Based on: https://github.com/guilhermelaz/n8n-waha-redis-local
#
# Usage:
#   cp .env.example .env   # edit credentials if desired
#   docker compose up -d
#   Then open:
#     N8N:            http://localhost:5678
#     WAHA Dashboard: http://localhost:3000/dashboard

services:
  postgres:
    image: postgres:16
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-default}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-default}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-default}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Database
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-default}
      # Redis (used by AI Agent memory node)
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - QUEUE_BULL_REDIS_PASSWORD=${REDIS_PASSWORD:-default}
      # General
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_LOG_LEVEL=debug
      # Community packages (install @devlikeapro/n8n-nodes-waha via UI after startup)
      - N8N_COMMUNITY_PACKAGES_ENABLED=true
      - N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE=true
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  waha:
    image: devlikeapro/waha:latest
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Engine
      - WHATSAPP_DEFAULT_ENGINE=GOWS
      # Webhook: send WhatsApp events to N8N
      - WHATSAPP_HOOK_EVENTS=message
      - WHATSAPP_HOOK_URL=http://host.docker.internal:5678/webhook/webhook
      # Dev-mode: no API key, no dashboard password
      - WAHA_NO_API_KEY=true
      - WAHA_DASHBOARD_NO_PASSWORD=true
    volumes:
      - waha_sessions:/app/.sessions
      - waha_media:/app/media
    depends_on:
      n8n:
        condition: service_started

volumes:
  pgdata:
  redis_data:
  n8n_data:
  waha_sessions:
  waha_media:

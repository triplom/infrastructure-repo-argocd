apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    
    rule_files:
      - "/etc/prometheus/rules/*.yml"
      - "/etc/prometheus/rules/*.yaml"
    
    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
      
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
        - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
        - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
          action: keep
          regex: default;kubernetes;https
      
      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
        - role: pod
        relabel_configs:
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
          action: keep
          regex: true
        - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
          action: replace
          target_label: __metrics_path__
          regex: (.+)
        - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
          action: replace
          regex: ([^:]+)(?::\d+)?;(\d+)
          replacement: $1:$2
          target_label: __address__
        - action: labelmap
          regex: __meta_kubernetes_pod_label_(.+)
        - source_labels: [__meta_kubernetes_namespace]
          action: replace
          target_label: kubernetes_namespace
        - source_labels: [__meta_kubernetes_pod_name]
          action: replace
          target_label: kubernetes_pod_name

      # ArgoCD Controller Metrics (GitOps Application metrics)
      - job_name: 'argocd-metrics'
        static_configs:
          - targets: ['argocd-metrics.argocd:8082']
        metrics_path: /metrics
        scrape_interval: 30s
        
      # ArgoCD Server Metrics (API and Web metrics)
      - job_name: 'argocd-server-metrics'
        static_configs:
          - targets: ['argocd-server-metrics.argocd:8083']
        metrics_path: /metrics
        scrape_interval: 30s
        
      # ArgoCD ApplicationSet Controller Metrics
      - job_name: 'argocd-applicationset-metrics'
        static_configs:
          - targets: ['argocd-applicationset-controller.argocd:8080']
        metrics_path: /metrics
        scrape_interval: 30s
        
      # ArgoCD Notifications Controller Metrics
      - job_name: 'argocd-notifications-metrics'
        static_configs:
          - targets: ['argocd-notifications-controller-metrics.argocd:9001']
        metrics_path: /metrics
        scrape_interval: 30s